<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI/CD Pipeline Project</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding-top: 100px;
    }

    .container {
      background: white;
      width: 60%;
      margin: auto;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
      font-size: 18px;
    }

    .status {
      color: green;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 CI/CD Pipeline Project</h1>

    <p>
      This website is automatically deployed using
      GitHub Actions and GitHub Pages.
    </p>

    <div class="status">
      ✅ Deployment Successful
    </div>
  </div>

</body>
</html>
